<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Rexmarket</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    /* =========================================
HEADER
========================================= */

body{

    margin:0;

    padding-top:74px;

}

#header{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:75px;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:rgba(8,20,45,.95);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 10px 30px rgba(0,0,0,.45);

    transition:.35s;

    z-index:99999;

}

/* Grid */

#header::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:

        linear-gradient(
            rgba(255,255,255,.05) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.05) 1px,
            transparent 1px
        );

    background-size:22px 22px;

    opacity:.35;

    animation:gridMove 8s linear infinite;

}

/* Scan */

#header::after{

    content:"";

    position:absolute;

    top:-100%;

    left:0;

    width:100%;
    height:100%;

    background:linear-gradient(

        transparent,

        rgba(255,255,255,.08),

        transparent

    );

    animation:scan 4s linear infinite;

}

/* Logo */

.header-logo{

    position:relative;

    width:450px;

    height:auto;

    display:block;

    object-fit:contain;

    z-index:2;

    pointer-events:none;

    user-select:none;

    filter:

        drop-shadow(0 0 8px rgba(255,255,255,.25))

        drop-shadow(0 0 18px rgba(30,144,255,.35));

}

/* Saat scroll */

#header.scrolled{

    background:rgba(125,10,20,.96);

    border-bottom:1px solid rgba(255,70,70,.20);

    box-shadow:

        0 10px 30px rgba(255,0,0,.25);

}

/* Animasi */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:22px 22px;

    }

}

@keyframes scan{

    from{

        top:-100%;

    }

    to{

        top:100%;

    }

}


    
    
    
    /* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* =========================================
BACKGROUND
========================================= */

body{

    margin:0;

    padding-top:100px;

    font-family:'Poppins',sans-serif;

    color:#fff;

    overflow-x:hidden;

    min-height:100vh;

    position:relative;

    background:linear-gradient(

        180deg,

        #0A1B36 0%,

        #07162B 20%,

        #05101F 40%,

        #1A0B17 65%,

        #3A0C16 82%,

        #541018 100%

    );

}

/* =========================================
GRID
========================================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    z-index:-2;

    pointer-events:none;

    background-image:

        linear-gradient(
            rgba(255,255,255,.04) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.04) 1px,
            transparent 1px
        );

    background-size:40px 40px;

    animation:gridMove 12s linear infinite;

    opacity:.25;

}

/* =========================================
GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    z-index:-1;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(40,90,180,.15),transparent 30%),

        radial-gradient(circle at 80% 25%,rgba(25,60,130,.12),transparent 35%),

        radial-gradient(circle at 50% 75%,rgba(150,25,35,.10),transparent 40%),

        radial-gradient(circle at 20% 100%,rgba(110,15,25,.14),transparent 35%);

    animation:glowMove 10s ease-in-out infinite alternate;

}

/* =========================================
ANIMATION
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

    }




/* =========================================
   GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(0,180,255,.25),transparent 28%),

        radial-gradient(circle at 85% 25%,rgba(40,120,255,.18),transparent 30%),

        radial-gradient(circle at 50% 75%,rgba(255,0,0,.12),transparent 35%),

        radial-gradient(circle at 20% 95%,rgba(255,60,60,.15),transparent 30%);

    animation:glowMove 10s ease-in-out infinite alternate;

    z-index:-1;

}

/* =========================================
   ANIMASI
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

}


/* =========================================
BOTTOM NAV
========================================= */
.bottom-nav{
    position:fixed;

    left:16px;
    right:16px;
    bottom:16px;

    height:72px;

    display:flex;
    justify-content:space-between;
    align-items:flex-end;

    padding:0 18px 10px;

    overflow:visible;

    border-radius:22px;

    background:rgba(8,20,42,.95);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 8px 25px rgba(0,0,0,.45);

    z-index:9999;
}

/* Cahaya */
.bottom-nav::before{
    content:"";
    position:absolute;
    left:8%;
    right:8%;
    bottom:-14px;
    height:36px;
    border-radius:50%;
    background:rgba(0,140,255,.45);
    filter:blur(30px);
    z-index:-2;
}

/* Grid */
.bottom-nav::after{
    content:"";
    position:absolute;
    inset:0;

    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);

    background-size:22px 22px;
    animation:bottomGrid 8s linear infinite;
    opacity:.35;

    z-index:-1;
}

/* =========================================
MENU ITEM
========================================= */

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;

    gap:4px;
    width:60px;

    color:#999;
    font-size:12px;

    cursor:pointer;
    transition:.25s;

    position:relative;
    z-index:2;
}

.nav-icon{
    width:22px;
    height:22px;

    fill:none;
    stroke:#999;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;

    transition:.25s;
}

.nav-item span{
    color:#999;
    font-weight:500;
    transition:.25s;
}

.nav-item.active .nav-icon{
    stroke:#ff4040;
}

.nav-item.active span{
    color:#ff4040;
    font-weight:600;
}

/* =========================================
CENTER BUTTON
========================================= */

.center-btn{
    position:fixed;

    left:50%;
    bottom:52px;

    transform:translateX(-50%);

    width:68px;
    height:68px;

    border:none;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(180deg,#2F78E7,#174EA6);

    cursor:pointer;

    z-index:10001;

    box-shadow:
        0 0 20px rgba(47,120,231,.45),
        0 8px 25px rgba(0,0,0,.45);

    transition:.2s;
}

.center-btn:active{
    transform:translateX(-50%) scale(.92);
}
     
    


    

    /* =========================================
NAV ACTIVE
========================================= */

.nav-item{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    gap:4px;

    width:60px;

    color:#999;
    font-size:12px;

    cursor:pointer;
    transition:all .25s ease;
}

.nav-icon{
    width:22px;
    height:22px;

    fill:none;
    stroke:#999;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;

    transition:all .25s ease;
}

.nav-item span{
    color:#999;
    font-weight:500;
    transition:all .25s ease;
}

.nav-item.active .nav-icon{
    stroke:#ff4040;
}

.nav-item.active span{
    color:#ff4040;
    font-weight:600;
}


/* =========================================
ICON
========================================= */
.menu-icon{

    display:grid;

    grid-template-columns:repeat(3,6px);

    gap:5px;

}

.menu-icon span{

    width:6px;

    height:6px;

    background:#fff;

    border-radius:50%;

    }


/* =========================================
ANIMATION
========================================= */

@keyframes bottomGrid{

    from{

        background-position:0 0;

    }

    to{

        background-position:22px 22px;

    }

}

/* Hilangkan highlight biru saat disentuh */
*{
    -webkit-tap-highlight-color: transparent;
}

/* Hilangkan outline saat fokus */
button,
.nav-item,
.center-btn,
a{
    -webkit-tap-highlight-color: transparent;
    outline: none;
}

button:focus,
button:active,
.nav-item:focus,
.center-btn:focus,
a:focus{
    outline: none;
}


/* =========================================
BANNER
========================================= */

.banner-slider{
    width:100%;
    height:140px;
    margin:0 0 18px;
    border-radius:18px;
    overflow:hidden;
    position:relative;
}

.banner-track{
    display:flex;
    width:300%;
    height:100%;
    transition:transform .5s ease;
}

.banner{
    width:100%;
    height:140px
    flex-shrink:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:#fff;

    background:linear-gradient(135deg,#0D47A1,#1976D2);
}

.banner h2{
    font-size:22px;
    font-weight:700;
    margin-bottom:4px;
}

.banner p{
    font-size:13px;
    opacity:.9;
}

.banner-dots{
    position:absolute;
    left:50%;
    bottom:10px;
    transform:translateX(-50%);
    display:flex;
    gap:6px;
}

.banner-dots span{
    width:7px;
    height:7px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    transition:.3s;
}

.banner-dots .active{
    background:#fff;
    width:20px;
    border-radius:20px;
}


    
    
</style>

</head>

<body>

    <!-- =========================================
HEADER
========================================= -->

<header id="header">

    <img
        src="Rexmarketlogo.png"
        class="header-logo"
        alt="">

</header>


<!-- =========================================
BANNER
========================================= -->

<div class="banner-slider">

    <div class="banner-track">

        <div class="banner">
            <h2>REXMARKET</h2>
            <p>TOP UP GAME MURAH & CEPAT</p>
        </div>

        <div class="banner">
            <h2>JOKI RANK</h2>
            <p>AMAN • CEPAT • TERPERCAYA</p>
        </div>

        <div class="banner">
            <h2>JUAL BELI AKUN</h2>
            <p>100% AMAN BERSAMA REXMARKET</p>
        </div>

    </div>

    <div class="banner-dots">
        <span class="active"></span>
        <span></span>
        <span></span>
    </div>

</div>
    
    
<div class="bottom-nav">

    <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M3 10.5L12 3l9 7.5v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/>
        </svg>
        <span>Beranda</span>
    </div>

    <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M6 2h12v20l-2-1-2 1-2-1-2 1-2-1-2 1V2z"/>
            <path d="M8 7h8M8 11h8M8 15h5"/>
        </svg>
        <span>Transaksi</span>
    </div>

    <!-- Ruang untuk tombol tengah -->
    <div class="nav-space"></div>

    <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24">
            <path d="M5 3h11a3 3 0 0 1 3 3v15H8a3 3 0 0 0-3 3z"/>
            <path d="M8 3v18"/>
        </svg>
        <span>Pesanan</span>
    </div>

    <div class="nav-item">
        <svg class="nav-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c1.8-4 14.2-4 16 0"/>
        </svg>
        <span>Akun</span>
    </div>

</div>

<button class="center-btn">

    <div class="menu-icon">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
    </div>

</button>


    
    
    
<script>

/* =========================================
   JAVASCRIPT
========================================= */
/* =========================================
HEADER
========================================= */

window.addEventListener("scroll",function(){

    const header=document.getElementById("header");

    if(window.scrollY>650){

        header.classList.add("scrolled");

    }else{

        header.classList.remove("scrolled");

    }

});

/* =========================================
NAVBAR ACTIVE
========================================= */

document.addEventListener("DOMContentLoaded", () => {
    const navItems = document.querySelectorAll(".nav-item");

    navItems.forEach((item) => {
        item.addEventListener("click", function () {
            navItems.forEach(i => i.classList.remove("active"));
            this.classList.add("active");
        });
    });
});

    /* =========================================
BANNER AUTO SLIDE
========================================= */

const track = document.querySelector(".banner-track");

const dots = document.querySelectorAll(".banner-dots span");

let index = 0;

function slideBanner(){

    index++;

    if(index > 2){

        index = 0;

    }

    track.style.transform = `translateX(-${index * 33.333}%)`;

    dots.forEach(dot => dot.classList.remove("active"));

    dots[index].classList.add("active");

}

setInterval(slideBanner,4000);
    
    
</script>

</body>

</html>
