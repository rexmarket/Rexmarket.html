<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexmarket</title>

<style>

/* 🔥 IMPORT FONT E-MUSE */
@font-face {
  font-family: "EMuseBold";
  src: url("fonts/E-Muse-Bold.otf") format("opentype");
}

/* BODY */
body {
  margin: 0;
  font-family: "EMuseBold", Arial, sans-serif;
  color: white;

  /* 🔵 background utama */
  background: #0f2f5f;

  position: relative;
  overflow-x: hidden;
}

/* 💠 FUTURISTIC BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 25%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 35%),

    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);

  background-size:
    auto,
    auto,
    auto,
    40px 40px,
    40px 40px;

  opacity: 0.35;

  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* 🔵 HEADER FUTURISTIC */
header {
  position: relative;
  overflow: hidden;
  padding: 18px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: white;

  font-family: "EMuseBold", Arial, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;

  background: #1e90ff;

  box-shadow: 0 0 35px rgba(30, 144, 255, 0.8);

  z-index: 1;
}

/* ⚡ GRID HEADER */
header::before {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    linear-gradient(rgba(255,255,255,0.18) 4px, transparent 4px),
    linear-gradient(90deg, rgba(255,255,255,0.18) 4px, transparent 4px);

  background-size: 18px 18px;

  opacity: 0.35;

  animation: gridMove 5s linear infinite;
}

@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(18px); }
}

/* 💡 glow pulse */
header::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(circle at center,
    rgba(255,255,255,0.25),
    rgba(30,144,255,0.15),
    transparent 70%
  );

  opacity: 0.6;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 0.7; }
  100% { opacity: 0.3; }
}

/* 👤 PROFILE ICON */
.profile-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);

  width: 34px;
  height: 34px;

  border-radius: 50%;

  display: flex;
  align-items: center;
  justify-content: center;

  background: rgba(255,255,255,0.15);
  transition: 0.2s;

  cursor: pointer;
  z-index: 2;

  font-size: 18px;
  line-height: 1;
}

.profile-icon:hover {
  background: rgba(255,255,255,0.3);
}

  .profile-icon span,
.profile-icon {
  display: flex;
  align-items: center;
  justify-content: center;
}

  .login-box {
  width: 90%;
  max-width: 350px;

  margin: auto;
  margin-top: 100px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);

  padding: 20px;
  border-radius: 12px;

  box-shadow: 0 0 25px rgba(30,144,255,0.4);
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;

  border: none;
  border-radius: 8px;

  background: #1f2937;
  color: white;
}

.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;

  border: none;
  border-radius: 8px;

  cursor: pointer;
  font-weight: bold;
}

.login-btn {
  background: #2563eb;
  color: white;
}

.link-btn {
  background: transparent;
  color: #93c5fd;
  font-size: 13px;
}

.google-btn {
  background: white;
  color: black;
}

.small {
  text-align: center;
  font-size: 12px;
  color: #cbd5e1;
  margin-top: 10px;
}
  

</style>
</head>

<body>

<div class="login-box">

  <h2>LOGIN</h2>

  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">

  <button class="btn login-btn">Login</button>

  <button class="btn link-btn">Lupa Password?</button>

  <button class="btn google-btn">Login dengan Google</button>

  <button class="btn link-btn">Ganti Password</button>

  <button class="btn link-btn">Registrasi</button>

  <div class="small">
    Rexmarket Secure Login
  </div>

</div>

  <!-- 👤 ICON -->
  <div class="profile-icon" onclick="goLogin()">
  <span>👤</span>
  </div>

<script>
function goLogin() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
