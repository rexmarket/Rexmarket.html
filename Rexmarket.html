<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexmarket</title>

<style>

/* 🔥 IMPORT FONT E-MUSE */
@font-face {
  font-family: "EMuseBold";
  src: url("fonts/E-Muse-Bold.otf") format("opentype");
}

/* BODY */
body {
  margin: 0;
  font-family: "EMuseBold", Arial, sans-serif;
  color: white;

  /* 🔵 biru gelap modern (tidak terlalu tua) */
  background: #0f2f5f;

  position: relative;
  overflow-x: hidden;
}

  body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  /* 🔷 pattern futuristik */
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 25%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 35%),

    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);

  background-size:
    auto,
    auto,
    auto,
    40px 40px,
    40px 40px;

  opacity: 0.35;

  animation: bgMove 12s linear infinite;
  }

  @keyframes bgMove {
  0% {
    transform: translateY(0);
  }
  100% {
    transform: translateY(40px);
  }
  }

/* 🔵 HEADER REXMARKET FUTURISTIC */
header {
  position: relative;
  overflow: hidden;
  padding: 18px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: white;

  font-family: "EMuseBold", Arial, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;

  /* 🔵 lebih terang */
  background: #1e90ff;

  /* 💡 glow lebih kuat */
  box-shadow: 0 0 35px rgba(30, 144, 255, 0.8);

  z-index: 1;
}
  
/* ⚡ GRID FUTURISTIC */
header::before {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    linear-gradient(rgba(255,255,255,0.18) 4px, transparent 4px),
    linear-gradient(90deg, rgba(255,255,255,0.18) 4px, transparent 4px);

  background-size: 18px 18px;

  opacity: 0.35;

  animation: gridMove 5s linear infinite;
}

/* ⚡ animasi grid */
@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(18px); }
}

/* 💡 glow pulse */
header::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(circle at center,
    rgba(255,255,255,0.25),
    rgba(30,144,255,0.15),
    transparent 70%
  );

  opacity: 0.6;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 0.7; }
  100% { opacity: 0.3; }
}



  

  
</style>
</head>

<body>

<header>
  Rexmarket
</header>


</body>
</html>
