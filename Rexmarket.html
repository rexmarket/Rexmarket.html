<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rexmarket</title>

<style>

/* 🔥 IMPORT FONT E-MUSE */
@font-face {
  font-family: "EMuseBold";
  src: url("fonts/E-Muse-Bold.otf") format("opentype");
}

/* BODY */
body {
  margin: 0;
  font-family: "EMuseBold", Arial, sans-serif;
  color: white;
  background: #0f2f5f;
  position: relative;
  overflow-x: hidden;
}

/* 💠 FUTURISTIC BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 25%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 35%),

    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);

  background-size:
    auto,
    auto,
    auto,
    40px 40px,
    40px 40px;

  opacity: 0.35;

  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* LOGIN BOX */
.login-box {
  width: 90%;
  max-width: 320px;

  margin: auto;
  margin-top: 100px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);

  padding: 20px;
  border-radius: 12px;

  box-shadow: 0 0 25px rgba(30,144,255,0.4);
}

/* JUDUL */
.login-box h2 {
  text-align: center;
  margin-top: 0;
  margin-bottom: 20px;
}

/* INPUT */
input {
  width: 100%;
  box-sizing: border-box;

  padding: 10px 12px;
  margin-bottom: 12px;

  border: none;
  border-radius: 8px;

  background: #1f2937;
  color: white;

  outline: none;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;

  border: none;
  border-radius: 8px;

  cursor: pointer;
  font-weight: bold;
}

.login-btn {
  background: #2563eb;
  color: white;
}

.link-btn {
  background: transparent;
  color: #93c5fd;
  font-size: 13px;
}

.google-btn {
  background: white;
  color: black;
}

.small {
  text-align: center;
  font-size: 12px;
  color: #cbd5e1;
  margin-top: 10px;
}

  .password-box{
  position: relative;
}

.password-box input{
  width: 100%;
  box-sizing: border-box;
  padding-right: 45px;
}

.eye{
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  user-select: none;
}

</style>
</head>

<body>

<div id="loginPage">

<div class="login-box">

  <h2>LOGIN</h2>

  <input id="username" type="text" placeholder="Username">

  <div class="password-box">
    <input id="password" type="password" placeholder="Password">
    <span class="eye" onclick="togglePassword()">👁️</span>
  </div>

  <button class="btn login-btn" onclick="loginUser()">Login</button>
  <button class="btn link-btn">Lupa Password?</button>

  <button class="btn google-btn" onclick="loginGoogle()">
    Login dengan Google
  </button>

  <button class="btn link-btn">Ganti Password</button>

  <button class="btn link-btn" onclick="registerUser()">
  Registrasi
  </button>

  <div class="small">
    Rexmarket Secure Login
  </div>

</div>

</div>

<div id="homePage" style="display:none;">

  <h1 style="
  text-align:center;
  margin-top:100px;
  ">
    Login Berhasil 🔥
  </h1>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Firebase Config -->
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXPtaQS38yacP1e1O5aeizcDaZN8RZxnI",
  authDomain: "rexmarket-3c106.firebaseapp.com",
  projectId: "rexmarket-3c106",
  storageBucket: "rexmarket-3c106.firebasestorage.app",
  messagingSenderId: "834700434615",
  appId: "1:834700434615:web:af36ceeca7fc8dec010132",
  measurementId: "G-G8WJK3MK7S"
};

firebase.initializeApp(firebaseConfig);
  
function loginGoogle() {

  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth()
    .signInWithPopup(provider)
    .then((result) => {

      localStorage.setItem("activeUser", JSON.stringify({
        name: result.user.displayName,
        email: result.user.email,
        photo: result.user.photoURL
      }));

      document.getElementById("loginPage").style.display = "none";
document.getElementById("homePage").style.display = "block";
    })
    .catch((error) => {
      alert(error.message);
    });

}

  function togglePassword() {
  const pw = document.getElementById("password");

  if (pw.type === "password") {
    pw.type = "text";
  } else {
    pw.type = "password";
  }
  }


  function registerUser() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username === "" || password === ""){
    alert("Isi Username dan Password dulu!");
    return;
  }

  localStorage.setItem(
    "user_" + username,
    JSON.stringify({
      username: username,
      password: password
    })
  );

  alert("Registrasi berhasil!");
  }

  function loginUser() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const userData = localStorage.getItem("user_" + username);

  if(!userData){
    alert("Username tidak ditemukan!");
    return;
  }

  const user = JSON.parse(userData);

  if(user.password !== password){
    alert("Password salah!");
    return;
  }

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";

  }

</script>

</body>
</html>
