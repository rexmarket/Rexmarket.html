<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* 🔴 HEADER MERAH DI ATAS */
header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* CARD */
.card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  border: 1px solid #1f2937;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
  border-color: #3b82f6;
}

/* 🔵 ACCENT BIRU */
.badge {
  display: inline-block;
  background: #2563eb;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 6px;
  margin-left: 5px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<header>
  🔥 TOPUP STORE
</header>

<div class="container">

  <h3>🎮 Pilih Game</h3>

  <div class="card">
    Mobile Legends <span class="badge">Hot</span>
  </div>

  <div class="card">
    Free Fire <span class="badge">Populer</span>
  </div>

  <div class="card">
    PUBG Mobile <span class="badge">New</span>
  </div>

</div>

</body>
</html>
