<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexmarket</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* 🔴 HEADER MERAH DI ATAS */
header {
  position: relative;
  overflow: hidden;
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: white;

  /* dasar merah api */
  background: linear-gradient(180deg, #7f1d1d, #dc2626, #fb923c);

  box-shadow: 0 0 25px rgba(220,38,38,0.6);
}

/* 🔥 LAYER API UTAMA */
header::before {
  content: "";
  position: absolute;
  left: 0;
  bottom: -30%;
  width: 100%;
  height: 140%;

  background: radial-gradient(circle at 20% 70%, rgba(255,255,255,0.25), transparent 35%),
              radial-gradient(circle at 50% 80%, rgba(249,115,22,0.7), transparent 40%),
              radial-gradient(circle at 80% 60%, rgba(220,38,38,0.8), transparent 45%);

  filter: blur(25px);
  opacity: 0.9;

  animation: fireWave 2.5s infinite alternate ease-in-out;
}

/* 🔥 api naik turun */
@keyframes fireWave {
  0% {
    transform: translateY(10px) scale(1);
  }
  100% {
    transform: translateY(-10px) scale(1.1);
  }
}

/* 🔥 layer flicker kecil */
header::after {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 2px,
    transparent 2px,
    transparent 6px
  );
  opacity: 0.15;
  animation: flicker 1.2s infinite;
}

@keyframes flicker {
  0% { opacity: 0.1; }
  50% { opacity: 0.2; }
  100% { opacity: 0.1; }
}

/* teks tetap di atas api */
header {
  z-index: 1;
}
  
/* 🔵 ACCENT BIRU */
.badge {
  display: inline-block;
  background: #2563eb;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 6px;
  margin-left: 5px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<header>
  🔥 TOPUP STORE
</header>

<div class="container">

  <h3>🎮 Pilih Game</h3>

  <div class="card">
    Mobile Legends <span class="badge">Hot</span>
  </div>

  <div class="card">
    Free Fire <span class="badge">Populer</span>
  </div>

  <div class="card">
    PUBG Mobile <span class="badge">New</span>
  </div>

</div>

</body>
</html>
