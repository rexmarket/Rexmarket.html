<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Rexmarket</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    
/* =========================================
HEADER
========================================= */

#header{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:72px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:transparent;

    transition:
        background .35s,
        box-shadow .35s,
        backdrop-filter .35s;

    z-index:9999;
}

#header.scrolled{

    background:linear-gradient(
        180deg,
        #d11d25,
        #9a141a
    );

    backdrop-filter:blur(10px);

    box-shadow:
        0 5px 18px rgba(255,0,0,.25);

}

#header h1{

    margin:0;

    color:#fff;

    font-family:'Poppins',sans-serif;

    font-size:25px;

    font-weight:700;

    letter-spacing:3px;

    text-shadow:
        0 0 12px rgba(255,255,255,.35);

    user-select:none;

}



    
    
/* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* =========================================
   GLOBAL
========================================= */

body{

    font-family:'Poppins',sans-serif;

    color:#fff;

    overflow-x:hidden;

    min-height:100vh;

    position:relative;

    background:
        linear-gradient(
            180deg,
            #49a8ff 0%,
            #2877ff 20%,
            #174da6 45%,
            #3b1b58 70%,
            #9d1826 100%
        );

}

/* =========================================
   GRID BACKGROUND
========================================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);

    background-size:40px 40px;

    opacity:.35;

    animation:gridMove 12s linear infinite;

    z-index:-2;

}

/* =========================================
   GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(0,180,255,.25),transparent 28%),

        radial-gradient(circle at 85% 25%,rgba(40,120,255,.18),transparent 30%),

        radial-gradient(circle at 50% 75%,rgba(255,0,0,.12),transparent 35%),

        radial-gradient(circle at 20% 95%,rgba(255,60,60,.15),transparent 30%);

    animation:glowMove 10s ease-in-out infinite alternate;

    z-index:-1;

}

/* =========================================
   ANIMASI
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

}

</style>

</head>

<body>

    <!-- =========================================
HEADER
========================================= -->

<header id="header">

    <h1>REXMARKET</h1>

</header>

    <button class="profile-btn">

        <svg viewBox="0 0 24 24" fill="none">

            <circle cx="12" cy="8" r="4" stroke="white" stroke-width="2"/>

            <path d="M4 20c1.5-4 5-6 8-6s6.5 2 8 6" stroke="white" stroke-width="2" stroke-linecap="round"/>

        </svg>

    </button>

</header>

    

<!-- HOME PAGE -->


<script>

/* =========================================
   JAVASCRIPT
========================================= */
/* =========================================
HEADER
========================================= */

window.addEventListener("scroll",function(){

    const header = document.getElementById("header");

    if(window.scrollY > 650){

        header.classList.add("scrolled");

    }else{

        header.classList.remove("scrolled");

    }

});
    
</script>

</body>

</html>
