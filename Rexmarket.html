<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Rexmarket</title>

<style>

@font-face {
  font-family: "EMuseBold";
  src: url("fonts/E-Muse-Bold.otf") format("opentype");
}

body {
  margin: 0;
  font-family: "EMuseBold", Arial, sans-serif;
  color: white;
  background: #0f2f5f;
  position: relative;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10), transparent 25%),
    radial-gradient(circle at 80% 40%, rgba(255,255,255,0.08), transparent 30%),
    radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 35%),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);

  background-size: auto, auto, auto, 40px 40px, 40px 40px;
  opacity: 0.35;
  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* BOX */
.login-box {
  width: 90%;
  max-width: 320px;
  margin: auto;
  margin-top: 100px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(30,144,255,0.4);
}

h2 {
  text-align: center;
  margin-top: 0;
  margin-bottom: 20px;
}

input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px 12px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  outline: none;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.login-btn { background: #2563eb; color: white; }
.link-btn { background: transparent; color: #93c5fd; font-size: 13px; }
.google-btn { background: white; color: black; }

.small {
  text-align: center;
  font-size: 12px;
  color: #cbd5e1;
  margin-top: 10px;
}

/* PASSWORD */
.password-box {
  position: relative;
}

.password-box input {
  padding-right: 45px;
}

.eye {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
}

/* PAGE CONTROL */
#registerPage, #homePage {
  display: none;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

  <div class="login-box">

    <h2>LOGIN</h2>

    <input id="username" type="text" placeholder="Username">

    <div class="password-box">
      <input id="password" type="password" placeholder="Password">
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button class="btn login-btn" onclick="loginUser()">Login</button>

    <button class="btn google-btn" onclick="loginGoogle()">
      Login dengan Google
    </button>

    <button class="btn link-btn" onclick="forgotPassword()">
  Lupa Password?
</button>

<button class="btn link-btn" onclick="changePassword()">
  Ganti Password
</button>

    <button class="btn link-btn" onclick="showRegister()">
      Registrasi
    </button>

    

    <div class="small">
      Rexmarket Secure Login
    </div>

  </div>
</div>

<!-- REGISTER PAGE -->
<div id="registerPage">

  <div class="login-box">

    <h2>REGISTER</h2>

    <input id="regUsername" type="text" placeholder="Username">

    <div class="password-box">
      <input id="regPassword" type="password" placeholder="Password">
      <span class="eye" onclick="toggleRegisterPassword()">👁️</span>
    </div>
    

    <button class="btn login-btn" onclick="registerUser()">
      Register
    </button>


    <button class="btn link-btn" onclick="backToLogin()">
      Kembali ke Login
    </button>

  

  </div>

</div>

<!-- HOME PAGE -->
<div id="homePage">
  <h1 style="text-align:center;margin-top:100px;">
    Login Berhasil 🔥
  </h1>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAXPtaQS38yacP1e1O5aeizcDaZN8RZxnI",
  authDomain: "rexmarket-3c106.firebaseapp.com",
  projectId: "rexmarket-3c106",
  storageBucket: "rexmarket-3c106.firebasestorage.app",
  messagingSenderId: "834700434615",
  appId: "1:834700434615:web:af36ceeca7fc8dec010132",
  measurementId: "G-G8WJK3MK7S"
};

firebase.initializeApp(firebaseConfig);

/* GOOGLE LOGIN */
/* GOOGLE LOGIN */
function loginGoogle() {

  const provider = new firebase.auth.GoogleAuthProvider();

  firebase.auth().signInWithPopup(provider)
    .then((result) => {

      localStorage.setItem("activeUser", JSON.stringify({
        name: result.user.displayName,
        email: result.user.email,
        photo: result.user.photoURL
      }));

      localStorage.setItem("lastLoginUser", JSON.stringify({
        username: result.user.displayName
      }));

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("homePage").style.display = "block";

    })
    .catch(err => alert(err.message));
}


/* TOGGLE PASSWORD */
function togglePassword() {
  const pw = document.getElementById("password");
  pw.type = pw.type === "password" ? "text" : "password";
}

function toggleRegisterPassword() {
  const pw = document.getElementById("regPassword");
  pw.type = pw.type === "password" ? "text" : "password";
}


/* PAGE SWITCH */
function showRegister() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("registerPage").style.display = "block";
}

function backToLogin() {
  document.getElementById("registerPage").style.display = "none";
  document.getElementById("loginPage").style.display = "block";
}


/* REGISTER */
function registerUser() {

  const username = document.getElementById("regUsername").value;
  const password = document.getElementById("regPassword").value;

  if (!username || !password) {
    alert("Isi Username dan Password dulu!");
    return;
  }

  localStorage.setItem("user_" + username, JSON.stringify({
    username,
    password
  }));

  alert("Registrasi berhasil!");
  backToLogin();
}


/* LOGIN */
function loginUser() {

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const data = localStorage.getItem("user_" + username);

  if (!data) {
    alert("Username tidak ditemukan!");
    return;
  }

  const user = JSON.parse(data);

  if (user.password !== password) {
    alert("Password salah!");
    return;
  }

  localStorage.setItem("lastLoginUser", JSON.stringify({
    username: username
  }));

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";
}


/* FORGOT PASSWORD */
function forgotPassword() {

  const username = prompt("Masukkan username kamu:");

  const data = localStorage.getItem("user_" + username);

  if (!data) {
    alert("Username tidak ditemukan!");
    return;
  }

  const confirmReset = confirm("Yakin mau reset password?");
  if (!confirmReset) return;

  const newPassword = prompt("Masukkan password baru:");

  if (!newPassword) {
    alert("Password tidak boleh kosong!");
    return;
  }

  const user = JSON.parse(data);
  user.password = newPassword;

  localStorage.setItem("user_" + username, JSON.stringify(user));

  alert("Password berhasil direset!");
}


/* CHANGE PASSWORD */
function changePassword() {

  const currentUser = localStorage.getItem("lastLoginUser");

  if (!currentUser) {
    alert("Kamu belum login!");
    return;
  }

  const user = JSON.parse(currentUser);

  const data = localStorage.getItem("user_" + user.username);

  if (!data) {
    alert("User tidak ditemukan!");
    return;
  }

  const realUser = JSON.parse(data);

  const oldPass = prompt("Masukkan password lama:");

  if (realUser.password !== oldPass) {
    alert("Password lama salah!");
    return;
  }

  const newPass = prompt("Masukkan password baru:");

  if (!newPass) {
    alert("Password tidak boleh kosong!");
    return;
  }

  realUser.password = newPass;

  localStorage.setItem("user_" + user.username, JSON.stringify(realUser));

  alert("Password berhasil diganti!");
    }

</script>

</body>
</html>
