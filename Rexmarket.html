<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rexmarket</title>

<style>

/* 🔥 IMPORT FONT E-MUSE */
@font-face {
  font-family: "EMuseBold";
  src: url("fonts/E-Muse-Bold.otf") format("opentype");
}

/* BODY */
body {
  margin: 0;
  font-family: "EMuseBold", Arial, sans-serif;
  background: #0b1220;
  color: white;
}

/* 🔵 HEADER REXMARKET FUTURISTIC */
header {
  position: relative;
  overflow: hidden;
  padding: 18px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: white;

  font-family: "EMuseBold", Arial, sans-serif;
  letter-spacing: 3px;
  text-transform: uppercase;

  /* 🔵 lebih terang */
  background: #1e90ff;

  /* 💡 glow lebih kuat */
  box-shadow: 0 0 35px rgba(30, 144, 255, 0.8);

  z-index: 1;
}
  
/* ⚡ GRID FUTURISTIC */
header::before {
  content: "";
  position: absolute;
  inset: 0;

  background-image:
    linear-gradient(rgba(255,255,255,0.18) 6px, transparent 6px),
    linear-gradient(90deg, rgba(255,255,255,0.18) 6px, transparent 6px);

  background-size: 18px 18px;

  opacity: 0.35;

  animation: gridMove 5s linear infinite;
}

/* ⚡ animasi grid */
@keyframes gridMove {
  0% { transform: translateY(0); }
  100% { transform: translateY(18px); }
}

/* 💡 glow pulse */
header::after {
  content: "";
  position: absolute;
  inset: 0;

  background: radial-gradient(circle at center,
    rgba(255,255,255,0.25),
    rgba(30,144,255,0.15),
    transparent 70%
  );

  opacity: 0.6;
  animation: pulse 2s infinite ease-in-out;
}

@keyframes pulse {
  0% { opacity: 0.3; }
  50% { opacity: 0.7; }
  100% { opacity: 0.3; }
}

/* 🔵 BADGE */
.badge {
  display: inline-block;
  background: #2563eb;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 6px;
  margin-left: 5px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: #9ca3af;
}

/* CONTAINER */
.container {
  padding: 15px;
}

.card {
  background: #111827;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>
  Rexmarket
</header>

<div class="container">

  <h3>🎮 Pilih Game</h3>

  <div class="card">
    Mobile Legends <span class="badge">Hot</span>
  </div>

  <div class="card">
    Free Fire <span class="badge">Populer</span>
  </div>

  <div class="card">
    PUBG Mobile <span class="badge">New</span>
  </div>

</div>

</body>
</html>
