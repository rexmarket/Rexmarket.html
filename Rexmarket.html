<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Rexmarket</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    /* =========================================
HEADER
========================================= */

#header{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:72px;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:transparent;

    transition:
        background .35s,
        box-shadow .35s,
        backdrop-filter .35s;

    z-index:9999;
}

/* Saat scroll ke area merah */

#header.scrolled{

    background:linear-gradient(
        180deg,
        #d11d25,
        #99151a
    );

    backdrop-filter:blur(10px);

    box-shadow:
        0 5px 18px rgba(255,0,0,.25);

}

/* GRID */

#header::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:

        linear-gradient(
            rgba(255,255,255,.05) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.05) 1px,
            transparent 1px
        );

    background-size:22px 22px;

    animation:headerGrid 8s linear infinite;

    opacity:.35;

    pointer-events:none;

}

/* SCAN */

#header::after{

    content:"";

    position:absolute;

    top:-100%;
    left:0;

    width:100%;
    height:100%;

    background:linear-gradient(

        transparent,

        rgba(255,255,255,.08),

        transparent

    );

    animation:headerScan 4s linear infinite;

    pointer-events:none;

}

/* VIDEO */

.header-logo{

    position:relative;

    width:230px;

    height:58px;

    object-fit:contain;

    display:block;

    pointer-events:none;

    user-select:none;

    z-index:2;

    filter:

        drop-shadow(0 0 8px rgba(255,255,255,.25))

        drop-shadow(0 0 18px rgba(30,144,255,.35));

}

/* ANIMASI */

@keyframes headerGrid{

    from{

        background-position:0 0;

    }

    to{

        background-position:22px 22px;

    }

}

@keyframes headerScan{

    from{

        top:-100%;

    }

    to{

        top:100%;

    }

}
    
    
    
    /* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* =========================================
   GLOBAL
========================================= */

body{

    font-family:'Poppins',sans-serif;

    color:#fff;

    overflow-x:hidden;

    min-height:100vh;

    position:relative;

    background:
        linear-gradient(
            180deg,
            #49a8ff 0%,
            #2877ff 20%,
            #174da6 45%,
            #3b1b58 70%,
            #9d1826 100%
        );

}

/* =========================================
   GRID BACKGROUND
========================================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background-image:
        linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);

    background-size:40px 40px;

    opacity:.35;

    animation:gridMove 12s linear infinite;

    z-index:-2;

}

/* =========================================
   GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(0,180,255,.25),transparent 28%),

        radial-gradient(circle at 85% 25%,rgba(40,120,255,.18),transparent 30%),

        radial-gradient(circle at 50% 75%,rgba(255,0,0,.12),transparent 35%),

        radial-gradient(circle at 20% 95%,rgba(255,60,60,.15),transparent 30%);

    animation:glowMove 10s ease-in-out infinite alternate;

    z-index:-1;

}

/* =========================================
   ANIMASI
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

}

</style>

</head>

<body>

    <!-- =========================================
HEADER
========================================= -->

<header id="header">

    <video
        class="header-logo"
        autoplay
        muted
        loop
        playsinline>

        <!-- Jika format WebM -->
        <source src="assets/logo.webm" type="video/webm">

        <!-- Jika format MP4 -->
        <!-- <source src="assets/logo.mp4" type="video/mp4"> -->

    </video>

</header>

    

<!-- HOME PAGE -->


<script>

/* =========================================
   JAVASCRIPT
========================================= */
/* =========================================
HEADER
========================================= */

window.addEventListener("scroll",function(){

    const header=document.getElementById("header");

    if(window.scrollY>650){

        header.classList.add("scrolled");

    }else{

        header.classList.remove("scrolled");

    }

});
    
</script>

</body>

</html>
