<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>Rexmarket</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

    /* =========================================
HEADER
========================================= */

body{

    margin:0;

    padding-top:95px;

}

#header{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:75px;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:rgba(8,20,45,.95);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border-bottom:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 10px 30px rgba(0,0,0,.45);

    transition:.35s;

    z-index:99999;

}

/* Grid */

#header::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:

        linear-gradient(
            rgba(255,255,255,.05) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.05) 1px,
            transparent 1px
        );

    background-size:22px 22px;

    opacity:.35;

    animation:gridMove 8s linear infinite;

}

/* Scan */

#header::after{

    content:"";

    position:absolute;

    top:-100%;

    left:0;

    width:100%;
    height:100%;

    background:linear-gradient(

        transparent,

        rgba(255,255,255,.08),

        transparent

    );

    animation:scan 4s linear infinite;

}

/* Logo */

.header-logo{

    position:relative;

    width:450px;

    height:auto;

    display:block;

    object-fit:contain;

    z-index:2;

    pointer-events:none;

    user-select:none;

    filter:

        drop-shadow(0 0 8px rgba(255,255,255,.25))

        drop-shadow(0 0 18px rgba(30,144,255,.35));

}

/* Saat scroll */

#header.scrolled{

    background:rgba(125,10,20,.96);

    border-bottom:1px solid rgba(255,70,70,.20);

    box-shadow:

        0 10px 30px rgba(255,0,0,.25);

}

/* Animasi */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:22px 22px;

    }

}

@keyframes scan{

    from{

        top:-100%;

    }

    to{

        top:100%;

    }

}


    
    
    
    /* =========================================
   RESET
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

/* =========================================
BACKGROUND
========================================= */

body{

    margin:0;

    padding-top:100px;

    font-family:'Poppins',sans-serif;

    color:#fff;

    overflow-x:hidden;

    min-height:100vh;

    position:relative;

    background:linear-gradient(

        180deg,

        #0A1B36 0%,

        #07162B 20%,

        #05101F 40%,

        #1A0B17 65%,

        #3A0C16 82%,

        #541018 100%

    );

}

/* =========================================
GRID
========================================= */

body::before{

    content:"";

    position:fixed;

    inset:0;

    z-index:-2;

    pointer-events:none;

    background-image:

        linear-gradient(
            rgba(255,255,255,.04) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.04) 1px,
            transparent 1px
        );

    background-size:40px 40px;

    animation:gridMove 12s linear infinite;

    opacity:.25;

}

/* =========================================
GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    z-index:-1;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(40,90,180,.15),transparent 30%),

        radial-gradient(circle at 80% 25%,rgba(25,60,130,.12),transparent 35%),

        radial-gradient(circle at 50% 75%,rgba(150,25,35,.10),transparent 40%),

        radial-gradient(circle at 20% 100%,rgba(110,15,25,.14),transparent 35%);

    animation:glowMove 10s ease-in-out infinite alternate;

}

/* =========================================
ANIMATION
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

    }




/* =========================================
   GLOW
========================================= */

body::after{

    content:"";

    position:fixed;

    inset:0;

    pointer-events:none;

    background:

        radial-gradient(circle at 15% 10%,rgba(0,180,255,.25),transparent 28%),

        radial-gradient(circle at 85% 25%,rgba(40,120,255,.18),transparent 30%),

        radial-gradient(circle at 50% 75%,rgba(255,0,0,.12),transparent 35%),

        radial-gradient(circle at 20% 95%,rgba(255,60,60,.15),transparent 30%);

    animation:glowMove 10s ease-in-out infinite alternate;

    z-index:-1;

}

/* =========================================
   ANIMASI
========================================= */

@keyframes gridMove{

    from{

        background-position:0 0;

    }

    to{

        background-position:40px 40px;

    }

}

@keyframes glowMove{

    from{

        transform:translateY(0) scale(1);

    }

    to{

        transform:translateY(-30px) scale(1.08);

    }

}

/* =========================================
BOTTOM NAV
========================================= */

.bottom-nav{

    position:fixed;

    left:16px;

    right:16px;

    bottom:16px;

    height:64px;

    overflow:visible;

    border-radius:22px;

    background:rgba(8,20,42,.95);

    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:
        0 8px 25px rgba(0,0,0,.45);

    z-index:9999;

}
    
/* GRID */

.bottom-nav::before{

    content:"";

    position:absolute;

    inset:0;

    background-image:

        linear-gradient(
            rgba(255,255,255,.05) 1px,
            transparent 1px
        ),

        linear-gradient(
            90deg,
            rgba(255,255,255,.05) 1px,
            transparent 1px
        );

    background-size:22px 22px;

    animation:bottomGrid 8s linear infinite;

    opacity:.35;

}

/* GLOW */

.bottom-nav::after{

    content:"";

    position:absolute;

    inset:0;

    background:

        radial-gradient(circle at 50% 50%,
        rgba(0,140,255,.18),
        transparent 70%);

}

    /* =========================================
CENTER BUTTON
========================================= */

.center-btn{

    position:absolute;

    left:50%;

    top:-28px;

    transform:translateX(-50%);

    width:68px;

    height:68px;

    border:none;

    border-radius:50%;

    background:linear-gradient(
        180deg,
        #215DBB,
        #123A82
    );

    display:flex;

    justify-content:center;
    align-items:center;

    cursor:pointer;

    z-index:10000;

    box-shadow:
        0 0 18px rgba(33,93,187,.35),
        0 8px 20px rgba(0,0,0,.45);

}

    .center-btn{

    -webkit-tap-highlight-color:transparent;

    transition:
        transform .18s ease,
        box-shadow .18s ease;

    }

    .center-btn:active{

    transform:
        translateX(-50%)
        scale(.90);

    box-shadow:

        0 0 35px rgba(40,120,255,.65),

        0 0 60px rgba(40,120,255,.35);

    }

/* =========================================
ICON
========================================= */

.menu-icon{

    display:grid;

    grid-template-columns:repeat(3,6px);

    gap:5px;

}

.menu-icon span{

    width:6px;

    height:6px;

    border-radius:50%;

    background:#fff;

}

/* =========================================
ANIMATION
========================================= */

@keyframes bottomGrid{

    from{

        background-position:0 0;

    }

    to{

        background-position:22px 22px;

    }

}

    
    
</style>

</head>

<body>

    <!-- =========================================
HEADER
========================================= -->

<header id="header">

    <img
        src="Rexmarketlogo.png"
        class="header-logo"
        alt="">

</header>
    
<div class="bottom-nav">

    <button class="center-btn">

        <div class="menu-icon">

            <span></span><span></span><span></span>

            <span></span><span></span><span></span>

            <span></span><span></span><span></span>

        </div>

    </button>

</div>



<script>

/* =========================================
   JAVASCRIPT
========================================= */
/* =========================================
HEADER
========================================= */

window.addEventListener("scroll",function(){

    const header=document.getElementById("header");

    if(window.scrollY>650){

        header.classList.add("scrolled");

    }else{

        header.classList.remove("scrolled");

    }

});
    
</script>

</body>

</html>
