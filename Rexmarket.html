<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp Store</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

/* 🔴 HEADER MERAH DI ATAS */
header {
  position: relative;
  overflow: hidden;
  padding: 18px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, #b91c1c, #ef4444, #f97316);
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

/* 🔥 efek api layer */
header::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -20%;
  width: 140%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(249,115,22,0.4), transparent 50%),
              radial-gradient(circle at 50% 80%, rgba(220,38,38,0.5), transparent 45%);
  filter: blur(20px);
  animation: fireMove 4s infinite alternate ease-in-out;
  opacity: 0.8;
}

/* 🔥 animasi gerak api */
@keyframes fireMove {
  0% {
    transform: translateY(0px) scale(1);
  }
  100% {
    transform: translateY(-10px) scale(1.05);
  }
}

/* biar teks tetap di atas efek */
header {
  z-index: 1;
}
  
/* 🔵 ACCENT BIRU */
.badge {
  display: inline-block;
  background: #2563eb;
  padding: 3px 8px;
  font-size: 12px;
  border-radius: 6px;
  margin-left: 5px;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border: none;
  border-radius: 8px;
  background: #1f2937;
  color: white;
  outline: none;
}

input:focus {
  border: 1px solid #3b82f6;
}

/* BUTTON */
button {
  width: 100%;
  padding: 10px;
  background: #2563eb;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>

<body>

<header>
  🔥 TOPUP STORE
</header>

<div class="container">

  <h3>🎮 Pilih Game</h3>

  <div class="card">
    Mobile Legends <span class="badge">Hot</span>
  </div>

  <div class="card">
    Free Fire <span class="badge">Populer</span>
  </div>

  <div class="card">
    PUBG Mobile <span class="badge">New</span>
  </div>

</div>

</body>
</html>
