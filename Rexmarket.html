const firebaseConfig = {

    let attempts = 0;
    let lockTime = 0;

    let attempts = 0;
    let lock = false;

    let registerCooldown = false;
    

    function hashPassword(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return hash;
    }

    function canRegister() {
  if (registerCooldown) return false;

  registerCooldown = true;
  setTimeout(() => {
    registerCooldown = false;
  }, 5000);

  return true;
    }

    function makeSession(username, type) {
  const token = btoa(username + ":" + type + ":" + Date.now());
  return { username, type, token };
    }
  
/* GOOGLE LOGIN */  
/* GOOGLE LOGIN */  
function loginGoogle() {  
  
  const provider = new firebase.auth.GoogleAuthProvider();  
  
  firebase.auth().signInWithPopup(provider)  
    .then((result) => {  
  
      const username = result.user.displayName || "User";  
  
      // simpan data user aktif (profil lengkap)  
      localStorage.setItem("activeUser", JSON.stringify({  
        name: result.user.displayName,  
        email: result.user.email,  
        photo: result.user.photoURL  
      }));  
  
      // session login (dipakai fitur logout / menu)  
      localStorage.setItem("lastLoginUser", JSON.stringify(
  makeSession(username, "google")
));
  
      // tampilkan username di UI  
      const display = document.getElementById("displayUser");  
      if (display) display.innerText = username;  
  
      // pindah halaman  
      document.getElementById("loginPage").style.display = "none";  
      document.getElementById("homePage").style.display = "block";  
  
      showToast("Login Google berhasil!");  
  
    })  
    .catch(err => {  
      showToast(err.message);  
    });  
  }  
  
  
/* TOGGLE PASSWORD */  
function togglePassword() {  
  const pw = document.getElementById("password");  
  pw.type = pw.type === "password" ? "text" : "password";  
}  
  
function toggleRegisterPassword() {  
  const pw = document.getElementById("regPassword");  
  pw.type = pw.type === "password" ? "text" : "password";  
}  
  
  
/* PAGE SWITCH */  
function showRegister() {  
  document.getElementById("loginPage").style.display = "none";  
  document.getElementById("registerPage").style.display = "block";  
}  
  
function backToLogin() {  
  document.getElementById("registerPage").style.display = "none";  
  document.getElementById("loginPage").style.display = "block";  
}  
  
  
/* REGISTER */  
function registerUser() {

  if (!canRegister()) {
    showToast("Tunggu 5 detik sebelum register lagi!");
    return;
  }

  const username = document.getElementById("regUsername").value.trim();
  const password = document.getElementById("regPassword").value.trim();

  if (username === "" || password === "") {
    showToast("Isi Username dan Password dulu!");
    return;
  }

  if (username.includes(" ") || username.length < 3) {
    showToast("Username tidak valid!");
    return;
  }

  if (!isStrongPassword(password)) {
    showToast("Password lemah! Minimal 8 karakter + huruf besar + angka");
    return;
  }

  const existingUser = localStorage.getItem("user_" + username);

  if (existingUser) {
    showToast("Username sudah dipakai!");
    return;
  }

  const hashedPassword = hashPassword(password);
  const sig = hashPassword(username + hashedPassword);

  const userData = {
    username,
    password: hashedPassword,
    sig,
    createdAt: Date.now()
  };

  localStorage.setItem("user_" + username, JSON.stringify(userData));

  showToast("Registrasi berhasil!");

  setTimeout(() => {
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";

    document.getElementById("regUsername").value = "";
    document.getElementById("regPassword").value = "";
  }, 800);
    }
  
  
    
/* LOGIN */  
function loginUser() {

  const now = Date.now();


  // 🔒 CEK LOCK TIME
  if (lockTime > now) {
    const sisa = Math.ceil((lockTime - now) / 1000);
    showToast(`Tunggu ${sisa} detik sebelum coba lagi`);
    return;
  }

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  // ❌ validasi kosong
  if (username === "" || password === "") {
    showToast("Isi username dan password!");
    return;
  }

  const data = localStorage.getItem("user_" + username);

  // ❌ USERNAME TIDAK ADA
  if (!data) {
    attempts++;
    showToast("Username tidak ditemukan!");
    checkLock();
    return;
  }

  const user = JSON.parse(data);

    // 🔐 CEK ANTI EDIT LOCALSTORAGE
if (user.sig !== hashPassword(user.username + user.password)) {
  showToast("Data dimodifikasi!");
  return;
    }

  // ❌ PASSWORD SALAH
  if (user.password !== password) {
    attempts++;
    showToast("Password salah!");
    checkLock();
    return;
  }

  // 🔓 LOGIN BERHASIL → RESET SECURITY
  attempts = 0;
  lockTime = 0;

  localStorage.setItem("lastLoginUser", JSON.stringify({
    username: username,
    type: "manual"
  }));

  const display = document.getElementById("displayUser");
  if (display) display.innerText = username;

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";

  showToast("Login berhasil!");
    }


// fungsi anti brute force
function checkLock() {
  if (attempts >= 5) {
    lockTime = Date.now() + 15000; // 15 detik lock
    attempts = 0;
    showToast("Terlalu banyak percobaan! Tunggu 15 detik");
  }
    }
  
  
/* FORGOT PASSWORD */  
function forgotPassword() {  
  
  const username = prompt("Masukkan username kamu:");  
  
  if (!username) {  
    showToast("Username tidak boleh kosong!");  
    return;  
  }  
  
  const data = localStorage.getItem("user_" + username);  
  
  if (!data) {  
    showToast("Username tidak ditemukan!");  
    return;  
  }  
  
  const confirmReset = confirm("Yakin mau reset password?");  
  if (!confirmReset) return;  
  
  const newPassword = prompt("Masukkan password baru:");  
  
  if (!newPassword || newPassword.trim() === "") {  
    showToast("Password tidak boleh kosong!");  
    return;  
  }  
  
  // ambil user lama  
  const user = JSON.parse(data);  
  
  // update password  
  user.password = newPassword.trim();  
  
  // simpan ulang ke localStorage  
  localStorage.setItem("user_" + username, JSON.stringify(user));  
  
  showToast("Password berhasil direset!");  
}  
    
  
  
/* CHANGE PASSWORD */  
function changePassword() {  
  
  const currentUser = localStorage.getItem("lastLoginUser");  
  
  if (!currentUser) {  
    showToast("Kamu belum login!");  
    return;  
  }  
  
  const user = JSON.parse(currentUser);  
  
  const data = localStorage.getItem("user_" + user.username);  
  
  if (!data) {  
    showToast("User tidak ditemukan!");  
    return;  
  }  
  
  const realUser = JSON.parse(data);  
  
  // input password lama  
  const oldPass = prompt("Masukkan password lama:");  
  
  if (!oldPass) {  
    showToast("Password lama wajib diisi!");  
    return;  
  }  
  
  if (realUser.password !== oldPass) {  
    showToast("Password lama salah!");  
    return;  
  }  
  
  // input password baru  
  const newPass = prompt("Masukkan password baru:");  
  
  if (!newPass || newPass.trim() === "") {  
    showToast("Password tidak boleh kosong!");  
    return;  
  }  
  
  // update password  
  realUser.password = newPass.trim();  
  
  localStorage.setItem("user_" + user.username, JSON.stringify(realUser));  
  
  showToast("Password berhasil diganti!");  
}  
  
  function toggleMenu() {  
  const menu = document.getElementById("menuBox");  
  menu.style.display = menu.style.display === "block" ? "none" : "block";  
}  
  
function logout() {
  localStorage.removeItem("lastLoginUser");
  sessionStorage.clear();

  attempts = 0;
  lockTime = 0;

  document.getElementById("homePage").style.display = "none";
  document.getElementById("loginPage").style.display = "block";
    }
  
  function showToast(message) {  
  const toast = document.getElementById("toast");  
  
  toast.innerText = message;  
  toast.style.display = "block";  
  toast.style.opacity = "1";  
  toast.style.transform = "translateX(-50%) translateY(0px)";  
  
  // reset timer biar gak numpuk  
  clearTimeout(toast._timeout);  
  
  toast._timeout = setTimeout(() => {  
    toast.style.opacity = "0";  
    toast.style.transform = "translateX(-50%) translateY(-10px)";  
  
    setTimeout(() => {  
      toast.style.display = "none";  
    }, 300);  
  
  }, 2000);  
  }  

    function isStrongPassword(pw) {
  return pw.length >= 8 &&
    /[A-Z]/.test(pw) &&
    /[a-z]/.test(pw) &&
    /[0-9]/.test(pw);
    }

    window.addEventListener("DOMContentLoaded", () => {

  const usernameInput = document.getElementById("username");
  const suggestBox = document.getElementById("suggestBox");

  if (!usernameInput || !suggestBox) return;

  usernameInput.addEventListener("input", function () {

    const value = this.value.trim().toLowerCase();

    if (value === "") {
      suggestBox.style.display = "none";
      return;
    }

    let found = [];

    // cari user dari localStorage
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);

      if (key.startsWith("user_")) {
        const username = key.replace("user_", "");

        if (username.toLowerCase().includes(value)) {
          found.push(username);
        }
      }
    }

    if (found.length === 0) {
      suggestBox.style.display = "none";
      return;
    }

    suggestBox.innerHTML = "";

    found.forEach(name => {
      const div = document.createElement("div");

      div.innerHTML = "👤 " + name;
      div.style.padding = "8px";
      div.style.cursor = "pointer";

      div.onmouseover = () => div.style.background = "#2563eb";
      div.onmouseout = () => div.style.background = "transparent";

      div.onclick = () => {

  const userData = localStorage.getItem("user_" + name);

  if (userData) {
    const user = JSON.parse(userData);

    usernameInput.value = user.username;
    document.getElementById("password").value = user.password;
  }

  suggestBox.style.display = "none";
};

      suggestBox.appendChild(div);
    });

    suggestBox.style.display = "block";
  });

  document.addEventListener("click", function (e) {
    if (!suggestBox.contains(e.target) && e.target !== usernameInput) {
      suggestBox.style.display = "none";
    }
  });

});

    window.addEventListener("DOMContentLoaded", () => {

  const session = localStorage.getItem("lastLoginUser");

  if (!session) return;

  let user;

  try {
    user = JSON.parse(session);

    if (!user.username) {
      localStorage.removeItem("lastLoginUser");
      return;
    }

  } catch {
    localStorage.removeItem("lastLoginUser");
    return;
  }

  // hanya auto login untuk Google
  if (user.type === "google") {

    const display = document.getElementById("displayUser");
    if (display) display.innerText = user.username;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("registerPage").style.display = "none";
    document.getElementById("homePage").style.display = "block";
  }
});
