<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banner Rexmarket</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#07152d;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.banner{
    width:90%;
    max-width:900px;
    height:220px;
    border-radius:22px;
    overflow:hidden;
    position:relative;

    background:linear-gradient(135deg,#1b4fd8,#0b1f46);

    border:1px solid rgba(255,255,255,.1);
}

.banner::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);

    background-size:25px 25px;
    animation:grid 8s linear infinite;
}

.banner-content{
    position:relative;
    z-index:2;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
}

.banner h1{
    font-size:38px;
}

.banner p{
    margin-top:8px;
    color:#cfd8ff;
}

@keyframes grid{
    from{
        background-position:0 0;
    }
    to{
        background-position:25px 25px;
    }
}
</style>

</head>
<body>

<div class="banner">
    <div class="banner-content">
        <h1>REXMARKET</h1>
        <p>TOP UP • JOKI • JUAL BELI AKUN</p>
    </div>
</div>

</body>
</html>
